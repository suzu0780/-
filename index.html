<!-- 最新のHTMLファイルだよとブラウザに共有するための宣言 -->
<!DOCTYPE html>
<!-- ファイルがどの言語で書かれているか -->
<html lang="ja">
<!-- 情報の管理 -->
<head>
    <!-- 文字化けしないための対策 -->
    <meta charset="UTF-8">
    <!-- レスポンシブデザイン対応の設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- WEBページのタイトル -->
    <title>Document</title>
</head>
<!-- WEBページの要素（ユーザーに届けたい情報） -->
<body>
    <!-- 見出し（h1～h6） -->
    <h1>こんにちは</h1>
    <!-- 段落 -->
    <p>私はT1Aの学生です。</p>
    <!-- リスト --> 
    <!-- 黒丸リスト -->
    <ul>
        <li>りんご</li>
        <li>ぶどう</li>
        <li>ばなな</li>
    </ul>
    <!-- 数字のリスト -->
    <ol>
        <li>リンゴ</li>
        <li>ぶどう</li>
        <li>ばなな</li>
    </ol>
<!-- 画像の挿入 --><!-- img.src=画像のディレクトリ”alt="画像が表示されてないとき” -->
